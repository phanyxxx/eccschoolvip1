      grade6:     'អង់គ្លេសថ្នាក់ទី៦ (Grade 6)',
      beginner:   'Beginner សម្រាប់កុមារ',
      alphabets:  'The English Alphabets',
      vocabulary: 'The Vocabulary',
    };

    const AVATAR_COLORS = ['av-blue', 'av-green', 'av-orange', 'av-red'];
    function getAvatarClass(name) { const code = (name || 'A').charCodeAt(0) % AVATAR_COLORS.length; return AVATAR_COLORS[code]; }
    function getInitials(name) { return (name || '?').split(' ').map(w => w[0]).slice(0, 2).join('').toUpperCase(); }
    function calcTotal(scores) { return ['attendance', 'homework', 'worksheet', 'voice_message', 'monthly_test'].reduce((s, k) => s + (parseFloat(scores[k]) || 0), 0); }
    function getGrade(total) { if (total >= 45) return 'A'; if (total >= 40) return 'B'; if (total >= 35) return 'C'; if (total >= 25) return 'D'; return 'F'; }
    function getScoreClass(total) { if (total >= 45) return 'score-excellent'; if (total >= 40) return 'score-good'; if (total >= 35) return 'score-avg'; return 'score-low'; }
    function formatDate(d) { if (!d) return '—'; return new Date(d).toLocaleDateString('en-GB', { day: '2-digit', month: 'short', year: 'numeric' }); }
    
    function getCourse(id) { return allCourses.find(c => c.id == id) || {}; }
    function getStudentScores(studentId) { return allScores.filter(s => s.student_id == studentId).map(s => ({ ...s, total: calcTotal(s), grade: getGrade(calcTotal(s)) })).sort((a, b) => new Date(b.created_at) - new Date(a.created_at)); }
    function getLatestScore(studentId) { const scores = getStudentScores(studentId); return scores[0] || null; }

    // API FUNCTIONS
    // ============================================================
    async function apiCall(endpoint, method = 'GET', body = null) {
      const url = API_BASE + endpoint;
      const headers = { 'Content-Type': 'application/json' };
      if (TOKEN) headers['Authorization'] = `Bearer ${TOKEN}`;
      const options = { method, headers };
      if (body) options.body = JSON.stringify(body);
      
      try {
        const res = await fetch(url, options);
        if (res.status === 401) {
          localStorage.removeItem('token');
          TOKEN = null;
          document.getElementById('loginPage').style.display = 'flex';
          document.getElementById('appShell').classList.remove('active');
          throw new Error('Session expired. Please login again.');
        }
        if (!res.ok) { 
          const err = await res.json().catch(() => ({ error: `HTTP ${res.status}` })); 
          throw new Error(err.error || err.message || `HTTP ${res.status}`); 
        }
        const json = await res.json();
        if (!json.success) throw new Error(json.error || 'API error');
        return json.data;
      } catch (error) {
        console.error('API Error:', error);
        throw error;
      }
    }

    async function loadAllData() {
      try {
        if (currentUser?.role === 'admin') {
          const studentsData = await apiCall('students.php?per_page=500&status=active');
          allStudents = studentsData.students || studentsData;

          const coursesData = await apiCall('courses.php');
          allCourses = coursesData;

          dashboardStats = await apiCall('scores.php?action=stats');

          // FIX #6: Populate allScores for admin so getLatestScore()
          // returns real data in the Students and Scores pages.
          allScores = await apiCall('scores.php?action=all');
        } else if (currentUser?.sid) {
          const studentData = await apiCall(`students.php?id=${currentUser.sid}`);
          allStudents = [studentData];
          
          const coursesData = await apiCall('courses.php');
          allCourses = coursesData;
          
          const scoresData = await apiCall(`scores.php?student_id=${currentUser.sid}`);
          allScores = scoresData;
        } else if (currentUser?.role === 'parent') {
          const studentData = await apiCall(`students.php?id=${currentUser.sid}`);
          allStudents = [studentData];
          
          const coursesData = await apiCall('courses.php');
          allCourses = coursesData;
          
          const scoresData = await apiCall(`scores.php?student_id=${currentUser.sid}`);
          allScores = scoresData;
        }
      } catch (e) {
        console.error('Load error:', e);
        toast('Failed to load data: ' + e.message, 'error');
      }
    }

    async function saveStudent(id) {
      const name = document.getElementById('sf_name')?.value;
      if (!name) { toast('Name required', 'error'); return; }
      
      const studentData = {
        name: name,
        gender: document.getElementById('sf_gender')?.value,
        age: parseInt(document.getElementById('sf_age')?.value),
        dob: document.getElementById('sf_dob')?.value,
        pob: document.getElementById('sf_pob')?.value,
        parent_name: document.getElementById('sf_parent_name')?.value,
        parent_phone: document.getElementById('sf_parent_phone')?.value,
        course_id: parseInt(document.getElementById('sf_course')?.value),
        status: document.getElementById('sf_status')?.value,
      };
      
      const username = document.getElementById('sf_username')?.value;
      const password = document.getElementById('sf_password')?.value;
      if (username && password) {
        studentData.username = username;
        studentData.password = password;
      }
      
      try {
        if (id) {
          await apiCall(`students.php?id=${id}`, 'PUT', studentData);
          toast('Student updated successfully', 'success');
        } else {
          await apiCall('students.php', 'POST', studentData);
          toast('Student added successfully', 'success');
        }
        closeModal('studentModal');
        await loadAllData();
        renderPage('students');
      } catch (error) {
        toast('Error saving student: ' + error.message, 'error');
      }
    }

      document.getElementById('confirmMsg').textContent = 'Delete this student? This will also delete all their scores.';

        try {
          await apiCall(`students.php?id=${id}`, 'DELETE');
          toast('Student deleted', 'warning');
          closeModal('confirmModal');
          await loadAllData();
          renderPage('students');
        } catch (error) {
          toast('Error deleting student: ' + error.message, 'error');

      };

    }

    // ============================================================
    // SCORES PAGE — grouped by score type, all rows inline
    // ============================================================
    let _scoresFilter = { course: '', q: '' };

    function renderScores() {
      if (!allStudents.length) return '<div class="empty-state" style="padding:3rem">No students found</div>';

      // Filter students
      const filtered = allStudents.filter(s => {
        const matchC = !_scoresFilter.course || s.course_id == _scoresFilter.course;
        const matchQ = !_scoresFilter.q || s.name.toLowerCase().includes(_scoresFilter.q.toLowerCase()) || s.student_code.toLowerCase().includes(_scoresFilter.q.toLowerCase());
        return matchC && matchQ;
      });

      // Group by score_type
      const groups = {};
      filtered.forEach(s => {
        const c = getCourse(s.course_id);
        const key = c.score_type || 'unknown';
        if (!groups[key]) groups[key] = { scoreType: key, courseName: c.name || '—', students: [] };
        groups[key].students.push(s);
      });

      const courseOptions = allCourses.map(c =>
        `<option value="${c.id}" ${_scoresFilter.course == c.id ? 'selected':''}>${escapeHtml(c.name)}</option>`
      ).join('');

      const totalScores = allScores.length;

      const groupHtml = Object.values(groups).map(g => {
        const fields = SCORE_TYPES[g.scoreType]?.fields || [];

        // Build one flat table: student header row + score rows
        const rows = g.students.map(s => {
          const studentScores = getStudentScores(s.id); // sorted newest first
          const latest = studentScores[0] || null;
          const scoreRowsHtml = studentScores.length === 0
            ? `<tr class="score-detail-row detail-${s.id}">

            </tr>

        const fieldHeaders = fields.map(f =>
          `<th style="text-align:center;min-width:90px">${f.label}<br><span style="font-weight:400;font-size:.72rem;color:var(--text-muted)">/ ${f.max} pts</span></th>`

        return `

              <div>

                ${fields.map(f => `<span style="background:rgba(42,82,152,.08);color:#2a5298;border-radius:6px;padding:.15rem .55rem;font-size:.74rem;font-weight:600">${f.label} /${f.max}</span>`).join('')}

          <div style="flex:1;min-width:180px;position:relative">
            <i class="bi bi-search" style="position:absolute;left:.75rem;top:50%;transform:translateY(-50%);color:var(--text-muted)"></i>
            <input id="scSearch" class="form-control" style="padding-left:2.2rem" placeholder="Search student name or code…"
              value="${escapeHtml(_scoresFilter.q)}" oninput="scFilterChange()">
          </div>
          <select id="scCourseFilter" class="form-select" style="max-width:210px" onchange="scFilterChange()">
            <option value="">All Score Types</option>${courseOptions}
          </select>
          <span style="color:var(--text-muted);font-size:.82rem">${totalScores} total score entries</span>
          <button class="btn-ghost" style="font-size:.82rem" onclick="expandAllScores()"><i class="bi bi-chevron-expand"></i> Expand All</button>

    function scFilterChange() {
      _scoresFilter.q      = document.getElementById('scSearch')?.value || '';
      _scoresFilter.course = document.getElementById('scCourseFilter')?.value || '';
      document.getElementById('pageContent').innerHTML = renderScores();
    }

    function toggleScoreRows(expandId, headerRow) {
      const rows = document.querySelectorAll(`.${expandId}`);
      const sid  = expandId.replace('detail-', '');
      const icon = document.querySelector(`.expand-icon-${sid}`);
      let anyVisible = false;
      rows.forEach(r => { if (r.style.display !== 'none') anyVisible = true; });
      rows.forEach(r => r.style.display = anyVisible ? 'none' : '');
      if (icon) icon.style.transform = anyVisible ? '' : 'rotate(180deg)';
    }

    function expandAllScores() {
      document.querySelectorAll('.score-detail-row').forEach(r => r.style.display = '');
      document.querySelectorAll('[class*="expand-icon-"]').forEach(i => i.style.transform = 'rotate(180deg)');
    }

    function collapseAllScores() {
      document.querySelectorAll('.score-detail-row').forEach(r => r.style.display = 'none');
      document.querySelectorAll('[class*="expand-icon-"]').forEach(i => i.style.transform = '');
    }

    async function deleteScore(scoreId, studentId) {
      if (!confirm('Delete this score entry?')) return;
      try {
        await apiCall(`scores.php?id=${scoreId}`, 'DELETE');
        // Remove from local cache
        allScores = allScores.filter(s => s.id !== scoreId);
        toast('Score deleted', 'warning');
        document.getElementById('pageContent').innerHTML = renderScores();
      } catch(e) {
        toast('Failed to delete: ' + e.message, 'error');
      }
    }

    // Keep old openScoreHistory for any remaining callers — now redirects inline
    async function openScoreHistory(studentId) {
      _scoresFilter.q = '';
      _scoresFilter.course = '';
      navigate('scores');
      // Expand just this student after render
      setTimeout(() => {
        const el = document.getElementById(`sturow-${studentId}`);
        if (el) { el.scrollIntoView({ behavior: 'smooth', block: 'center' }); el.click(); }
      }, 200);
    }

    async function openScoreModal(studentId) {
      const s = allStudents.find(s => s.id === studentId);
      const c = getCourse(s.course_id);
      const type = SCORE_TYPES[c.score_type] || { fields: [] };
      const existingScores = getStudentScores(studentId);

      document.getElementById('scoreModalTitle').textContent = `Add Score — ${escapeHtml(s.name)}`;
      document.getElementById('scoreModalBody').innerHTML = `
        <div style="background:rgba(42,82,152,.06);border-radius:8px;padding:.6rem 1rem;margin-bottom:1rem;font-size:.82rem;color:var(--text-muted)">
          Course: <strong style="color:var(--text)">${escapeHtml(c.name)}</strong> &nbsp;·&nbsp;
          Fields: <strong style="color:var(--text)">${type.fields.map(f => f.label + ' (/' + f.max + ')').join(' · ')}</strong>
        </div>
        <div class="mb-3">
          <label class="fw-semibold">Week / Period Label <span style="color:#d94040">*</span></label>
          <input id="sc_week" class="form-control mt-1" value="Week ${existingScores.length + 1}" placeholder="e.g. Week 1, Month 1">
        </div>
        ${type.fields.map(f => `
          <div class="mb-3">
            <label class="fw-semibold">${f.label} <span style="color:var(--text-muted);font-weight:400">(0 – ${f.max})</span></label>
            <input type="number" id="sc_${f.key}" class="form-control mt-1" min="0" max="${f.max}" step="0.5" placeholder="Enter score">
          </div>`).join('')}
        <div class="mb-3">
          <label class="fw-semibold">Notes <span style="color:var(--text-muted);font-weight:400">(optional)</span></label>
          <textarea id="sc_notes" class="form-control mt-1" rows="2" placeholder="Any remarks…"></textarea>
        </div>
        <div style="display:flex;gap:.75rem;justify-content:flex-end">
          <button class="btn-ghost" onclick="closeModal('scoreModal')">Cancel</button>
          <button class="btn-primary-sms" onclick="saveScore(${studentId}, '${c.score_type}')"><i class="bi bi-check-lg"></i> Save Score</button>
        </div>
      `;
      openModal('scoreModal');
    }

    async function saveScore(studentId, scoreType) {
      const week = document.getElementById('sc_week')?.value?.trim();
      if (!week) { toast('Week label is required', 'error'); return; }

      const fields = SCORE_TYPES[scoreType]?.fields || [];
      const scoreData = { student_id: studentId, week_label: week };

      for (const f of fields) {
        const val = document.getElementById(`sc_${f.key}`)?.value;
        if (val !== undefined && val !== '') scoreData[f.key] = parseFloat(val);
      }

      const notes = document.getElementById('sc_notes')?.value;
      if (notes) scoreData.notes = notes;

      try {
        const newScore = await apiCall('scores.php', 'POST', scoreData);
        // Inject into local cache so page refreshes without a full reload
        allScores.unshift(newScore);
        toast('Score saved successfully', 'success');
        closeModal('scoreModal');
        document.getElementById('pageContent').innerHTML = renderScores();
        // Auto-expand the student we just saved
        setTimeout(() => {
          const el = document.getElementById(`sturow-${studentId}`);
          if (el) { el.scrollIntoView({ behavior: 'smooth', block: 'center' }); el.click(); }
        }, 100);
      } catch (error) {
        toast('Error saving score: ' + error.message, 'error');
      }
    }

      document.getElementById('courseModalTitle').textContent = 'Edit Course';
      document.getElementById('courseModalBody').innerHTML = `

      }
      sel.addEventListener('change', updateHint);

    async function saveCourse(id) {
      const name = document.getElementById('cf_name')?.value;
      const scoreType = document.getElementById('cf_type')?.value;
      const description = document.getElementById('cf_description')?.value;
      
      if (!name) { toast('Course name required', 'error'); return; }
      
      const courseData = { name, score_type: scoreType, description };
      
      try {
        if (id) {
          await apiCall(`courses.php?id=${id}`, 'PUT', courseData);
          toast('Course updated successfully', 'success');
        } else {
          await apiCall('courses.php', 'POST', courseData);
          toast('Course added successfully', 'success');
        }
        closeModal('courseModal');
        await loadAllData();
        renderPage('courses');
      } catch (error) {
        toast('Error saving course: ' + error.message, 'error');
      }
    }

    async function deleteCourse(id) {
      const cnt = allStudents.filter(s => s.course_id === id).length;
      if (cnt > 0) { 
        toast(`Cannot delete: ${cnt} student(s) enrolled in this course`, 'error'); 
        return; 
      }
      
      document.getElementById('confirmMsg').textContent = 'Delete this course?';
      document.getElementById('confirmBtn').onclick = async () => {
        try {
          await apiCall(`courses.php?id=${id}`, 'DELETE');
          toast('Course deleted', 'warning');
          closeModal('confirmModal');
          await loadAllData();
          renderPage('courses');
        } catch (error) {
          toast('Error deleting course: ' + error.message, 'error');
        }
      };
      openModal('confirmModal');
    }

    function renderMyScores() {
      const s = getMyStudent();
      if (!s) return '<div class="empty-state">No scores available</div>';
      const scores = getStudentScores(s.id);
      const latestScore = scores[0];
      const c      = getCourse(s.course_id);
      const fields = SCORE_TYPES[c.score_type]?.fields || [];

      const gradeColor = { A:'#1b9e6e', B:'#0ea5e9', C:'#e8a020', D:'#d94040', F:'#888' };

      // Mini stat cards
      const statCards = scores.length ? (() => {
        const avg  = scores.reduce((s,r)=>s+r.total,0)/scores.length;
        const best = Math.max(...scores.map(r=>r.total));
        const gc   = latestScore ? (gradeColor[latestScore.grade]||'#888') : '#888';
        return `
          <div style="display:flex;gap:.75rem;margin-bottom:1.25rem;flex-wrap:wrap">
            <div class="profile-stat" style="border-top:3px solid ${gc}">
              <div class="profile-stat-value" style="color:${gc}">${latestScore.total.toFixed(1)}</div>
              <div class="profile-stat-label">Latest / 50</div>
            </div>
            <div class="profile-stat" style="border-top:3px solid #2a5298">
              <div class="profile-stat-value" style="color:#2a5298">${avg.toFixed(1)}</div>
              <div class="profile-stat-label">Average</div>
            </div>
            <div class="profile-stat" style="border-top:3px solid #1b9e6e">
              <div class="profile-stat-value" style="color:#1b9e6e">${best.toFixed(1)}</div>
              <div class="profile-stat-label">Best Score</div>
            </div>
            <div class="profile-stat" style="border-top:3px solid ${gc}">
              <div class="profile-stat-value" style="color:${gc}">${latestScore.grade}</div>
              <div class="profile-stat-label">Grade</div>
            </div>
          </div>`;
      })() : '';

      // Chart (only if ≥2 scores)
      const chartHtml = scores.length >= 2 ? `
        <div class="card mb-3">
          <div class="card-header" style="padding:.85rem 1.2rem">
            <span class="card-title" style="font-size:.88rem"><i class="bi bi-graph-up" style="color:#e8a020;margin-right:.4rem"></i>Score Trend</span>
          </div>
          <div class="card-body" style="padding:1rem">
            <canvas id="myScoreChart" style="max-height:160px"></canvas>
          </div>
        </div>` : '';

      // Score table — only relevant columns for this course type
      const fieldHeaders = fields.map(f =>
        `<th style="text-align:center;white-space:nowrap">${f.label}<br><small style="font-weight:400;opacity:.7">/${f.max}</small></th>`
      ).join('');

      const rows = scores.map((sc, i) => {
        const gc = gradeColor[sc.grade] || '#888';
        const fieldCells = fields.map(f =>
          `<td style="text-align:center">${sc[f.key] !== null && sc[f.key] !== undefined ? `<span style="font-weight:600">${parseFloat(sc[f.key]).toFixed(1)}</span>` : '<span style="color:var(--text-muted)">—</span>'}</td>`
        ).join('');
        return `<tr style="${i%2===0?'background:var(--bg)':''}">
          <td style="white-space:nowrap;font-weight:600">${escapeHtml(sc.week_label)}</td>
          ${fieldCells}
          <td style="text-align:center;font-weight:800;color:${gc};font-size:.95rem">${sc.total.toFixed(1)}</td>
          <td style="text-align:center">
            <span style="background:${gc}20;color:${gc};font-weight:700;padding:.2rem .6rem;border-radius:7px;font-size:.85rem">${sc.grade}</span>
          </td>
          <td style="color:var(--text-muted);font-size:.75rem;white-space:nowrap">${formatDate(sc.created_at)}</td>
        </tr>`;
      }).join('') || `<tr><td colspan="${fields.length+4}" style="text-align:center;padding:2rem;color:var(--text-muted)">No scores recorded yet</td></tr>`;

      return `
        ${statCards}
        ${chartHtml}
        <div class="card">
          <div class="card-header" style="flex-wrap:wrap;gap:.5rem">
            <div>
              <span class="card-title">Score History</span>
              <span style="font-size:.75rem;color:var(--text-muted);margin-left:.5rem">${scores.length} record${scores.length!==1?'s':''}</span>
            </div>
            <div style="margin-left:auto;display:flex;gap:.5rem;align-items:center;flex-wrap:wrap">
              <span class="score-chip"><i class="bi bi-book-half"></i> ${escapeHtml(c.name||'—')}</span>
              <button onclick="saveReportPDF(${s.id})"
                style="background:linear-gradient(135deg,#d94040,#e06060);color:#fff;border:none;border-radius:8px;padding:.4rem .9rem;font-size:.82rem;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:.3rem">
                <i class="bi bi-file-earmark-pdf-fill"></i> PDF
              </button>
            </div>
          </div>
          <div class="table-wrapper">
            <table class="sms-table">
              <thead>
                <tr>
                  <th>Week</th>
                  ${fieldHeaders}
                  <th style="text-align:center">Total</th>
                  <th style="text-align:center">Grade</th>
                  <th>Date</th>
                </tr>
              </thead>
              <tbody>${rows}</tbody>
            </table>
          </div>
        </div>`;
    }

    function initMyScoreChart() {
      const s = getMyStudent();
      if (!s) return;
      const scores = getStudentScores(s.id).reverse(); // oldest first
      const ctx = document.getElementById('myScoreChart');
      if (!ctx || scores.length < 2) return;

      const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
      const gridColor = isDark ? 'rgba(255,255,255,.08)' : 'rgba(0,0,0,.06)';
      const textColor = isDark ? '#8faac2' : '#637085';

      new Chart(ctx, {
        type: 'line',
        data: {
          labels: scores.map(s => s.week_label),
          datasets: [{
            label: 'Total Score',
            data: scores.map(s => s.total),
            borderColor: '#e8a020',
            backgroundColor: 'rgba(232,160,32,.12)',
            borderWidth: 2.5,
            pointBackgroundColor: '#e8a020',
            pointRadius: 5,
            tension: 0.35,
            fill: true,
          }]
        },
        options: {
          responsive: true, maintainAspectRatio: false,
          plugins: { legend: { display: false } },
          scales: {
            y: {
              min: 0, max: 50,
              grid: { color: gridColor },
              ticks: { color: textColor, stepSize: 10 },
            },
            x: { grid: { display: false }, ticks: { color: textColor } }
          }
        }
      });
    }

    function renderChildView() { return renderMyProfile(); }
    function renderChildScores() { return renderMyScores(); }

    // ============================================================
    // ATTENDANCE PAGE
    // ============================================================
    let _attendanceDate = new Date().toISOString().slice(0, 10);
    let _attendanceData = [];

    async function renderAttendancePage(el) {
      try {
        _attendanceData = await apiCall(`attendance.php?date=${_attendanceDate}`);

        el.innerHTML = `<div class="empty-state">Failed to load attendance: ${e.message}</div>`;
        return;
      }

      const byCourse = {};
      _attendanceData.forEach(r => {
        if (!byCourse[r.course_name]) byCourse[r.course_name] = [];
        byCourse[r.course_name].push(r);
      });

      const totalPresent  = _attendanceData.filter(r => r.status === 'present').length;
      const totalAbsent   = _attendanceData.filter(r => r.status === 'absent').length;
      const totalLate     = _attendanceData.filter(r => r.status === 'late').length;
      const totalExcused  = _attendanceData.filter(r => r.status === 'excused').length;
      const totalMarked   = _attendanceData.filter(r => r.status).length;
      const totalStudents = _attendanceData.length;

      const statusBtnStyle = (current, target) => {
        const styles = {
          present: 'background:#1b9e6e;color:#fff;border-color:#1b9e6e',
          absent:  'background:#d94040;color:#fff;border-color:#d94040',
          late:    'background:#e8a020;color:#0f2744;border-color:#e8a020',
          excused: 'background:#0ea5e9;color:#fff;border-color:#0ea5e9',
        };
        return current === target
          ? styles[target]
          : 'background:var(--bg);color:var(--text-muted);border:1px solid var(--border)';
      };

      const courseBlocks = Object.entries(byCourse).map(([course, students]) => `
        <div class="card mb-3">
          <div class="card-header" style="background:rgba(42,82,152,.07)">

            <span style="font-size:.8rem;color:var(--text-muted)">${students.length} student${students.length!==1?'s':''}</span>

              ${students.map(r => `
                <tr id="att-row-${r.student_id}">
                  <td>
                    <div class="stu-cell">
                      <div class="stu-avatar ${getAvatarClass(r.student_name)}">${getInitials(r.student_name)}</div>
                      <div><div>${escapeHtml(r.student_name)}</div><small style="color:var(--text-muted)">${r.student_code}</small></div>

                  <td style="text-align:center">
                    <button onclick="markAttendance(${r.student_id},'${st}')"

                      style="width:34px;height:34px;border-radius:8px;cursor:pointer;border:1px solid var(--border);transition:all .15s;${statusBtnStyle(r.status, st)}"
                      title="${st.charAt(0).toUpperCase()+st.slice(1)}">

                    <input id="att-note-${r.student_id}" class="form-control form-control-sm"
                      value="${escapeHtml(r.notes || '')}"
                      placeholder="Note (optional)"
                      onblur="saveAttendanceNote(${r.student_id})"

      el.innerHTML = `

            <span style="background:rgba(14,165,233,.12);color:#0ea5e9;padding:.25rem .75rem;border-radius:20px;font-size:.8rem;font-weight:600">📋 ${totalExcused} Excused</span>

    async function changeAttendanceDate(date) {
      _attendanceDate = date;
      const el = document.getElementById('pageContent');
      el.innerHTML = '<div class="text-center p-4"><div class="spinner-border text-primary" role="status"></div></div>';
      await renderAttendancePage(el);
    }

    async function markAttendance(studentId, status) {
      const noteEl = document.getElementById(`att-note-${studentId}`);
      const notes  = noteEl?.value || '';

      // Optimistic UI — highlight buttons immediately
      ['present','late','excused','absent'].forEach(st => {
        const btn = document.getElementById(`att-${studentId}-${st}`);
        if (!btn) return;
        const styles = {
          present: 'background:#1b9e6e;color:#fff;border-color:#1b9e6e',
          absent:  'background:#d94040;color:#fff;border-color:#d94040',
          late:    'background:#e8a020;color:#0f2744;border-color:#e8a020',
          excused: 'background:#0ea5e9;color:#fff;border-color:#0ea5e9',
        };
        btn.style.cssText = `width:34px;height:34px;border-radius:8px;cursor:pointer;transition:all .15s;${
          st === status ? styles[st] : 'background:var(--bg);color:var(--text-muted);border:1px solid var(--border)'
        }`;
      });

      // Update local data
      const rec = _attendanceData.find(r => r.student_id === studentId);
      if (rec) rec.status = status;

      try {
        await apiCall('attendance.php', 'POST', {
          student_id: studentId,
          date: _attendanceDate,
          status,
          notes,
        });
      } catch (e) {
        toast('Failed to save: ' + e.message, 'error');
      }
    }

    async function saveAttendanceNote(studentId) {
      const rec = _attendanceData.find(r => r.student_id === studentId);
      if (!rec || !rec.status) return; // don't save note without a status
      const notes = document.getElementById(`att-note-${studentId}`)?.value || '';
      try {
        await apiCall('attendance.php', 'POST', {
          student_id: studentId,
          date: _attendanceDate,
          status: rec.status,
          notes,
        });
      } catch (e) { /* silent */ }
    }

    async function markAllAttendance(status) {
      const promises = _attendanceData.map(r => markAttendance(r.student_id, status));
      await Promise.all(promises);
      toast(`All students marked as ${status}`, 'success');
    }

                    ['Full Name', `<strong>${escapeHtml(s.name)}</strong>`],

                    ['Parent / Guardian', `${escapeHtml(s.parent_name)} · ${escapeHtml(s.parent_phone)}`],

                </table>
              </td>
              <td style="width:35%;vertical-align:top;text-align:center">

                <div style="border:2px solid ${gColor};border-radius:12px;padding:.85rem;display:inline-block;min-width:110px">
                  <div style="font-size:2rem;font-weight:700;color:${gColor};line-height:1">${latest.total.toFixed(1)}</div>
                  <div style="color:#637085;font-size:.7rem;margin:.15rem 0">/ 50 pts</div>

          </div>

    // ============================================================
    // UTILITIES
    // ============================================================
    // FIX #7: Escape double-quotes so values are safe inside HTML attributes
    // like value="..." — omitting this could break the DOM or allow injection.
    function escapeHtml(str) {
      if (!str) return '';
      return str.replace(/[&<>"]/g, function (m) {
        if (m === '&')  return '&amp;';
        if (m === '<')  return '&lt;';
        if (m === '>')  return '&gt;';
        if (m === '"')  return '&quot;';
        return m;
      });
    }
    
    function openModal(id) { 
      document.getElementById(id).classList.add('open'); 
      document.body.style.overflow = 'hidden'; 
    }
    
    function closeModal(id) { 
      document.getElementById(id).classList.remove('open'); 
      document.body.style.overflow = ''; 
    }
    
    function toast(msg, type = 'info') { 
      const container = document.getElementById('toastContainer'); 
      const el = document.createElement('div'); 
      el.className = `toast-item toast-${type}`; 
      el.innerHTML = `<span>${escapeHtml(msg)}</span>`; 
      container.appendChild(el); 
      setTimeout(() => el.remove(), 3000); 
    }
    
    function toggleDark() { 
      const isDark = document.documentElement.getAttribute('data-theme') === 'dark'; 
      document.documentElement.setAttribute('data-theme', isDark ? 'light' : 'dark'); 
      localStorage.setItem('sms_theme', isDark ? 'light' : 'dark'); 
    }
    
    function toggleSidebar() { 
      document.getElementById('sidebar').classList.toggle('open'); 
    }
    
    function closeSidebar() { 
      document.getElementById('sidebar').classList.remove('open'); 
    }

    // Initialize theme
    (function() { 
      const t = localStorage.getItem('sms_theme') || 'light'; 
      document.documentElement.setAttribute('data-theme', t); 
    })();
    
    document.addEventListener('keydown', e => { 
      if (e.key === 'Escape') document.querySelectorAll('.modal-overlay.open').forEach(el => closeModal(el.id)); 
    });
  </script>
</body>
</html>
